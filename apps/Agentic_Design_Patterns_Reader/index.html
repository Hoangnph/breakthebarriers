<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Design Patterns Reader</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar" aria-label="Table of Contents Sidebar">
            <div class="sidebar-header">
                <h2>Table of Contents</h2>
                <button id="toggle-sidebar" class="icon-btn" title="Collapse Sidebar" aria-label="Collapse Sidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            
            <!-- Searchable TOC Box -->
            <div class="sidebar-search" id="toc-search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="toc-search" placeholder="Search chapters & pages..." aria-label="Search Table of Contents" autocomplete="off">
                    <button id="clear-search" class="clear-btn" title="Clear Search" aria-label="Clear Search">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="sidebar-content" id="toc-container" role="navigation">
                <!-- TOC dynamically generated here -->
            </div>

            <!-- Premium Keyboard Shortcuts Footer -->
            <div class="sidebar-footer">
                <div class="sidebar-footer-row">
                    <span>Navigate Pages</span>
                    <span><kbd class="kbd-badge">←</kbd> <kbd class="kbd-badge">→</kbd></span>
                </div>
                <div class="sidebar-footer-row">
                    <span>Zoom In / Out</span>
                    <span><kbd class="kbd-badge">+</kbd> <kbd class="kbd-badge">-</kbd></span>
                </div>
                <div class="sidebar-footer-row">
                    <span>Clear / Close</span>
                    <span><kbd class="kbd-badge">ESC</kbd></span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header Toolbar -->
            <header class="toolbar" aria-label="Controls Toolbar">
                <div class="toolbar-left">
                    <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Table of Contents" aria-label="Toggle Table of Contents">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="doc-title">Agentic Design Patterns</h1>
                </div>
                <div class="toolbar-right">

                    <!-- Language Selection Toggle -->
                    <div class="lang-controls">
                        <button id="toggle-lang" class="icon-btn tooltip-trigger" title="Switch Language (EN / VI)" aria-label="Switch Language">
                            <i class="fas fa-language"></i> 
                            <span id="current-lang-text">EN</span>
                        </button>
                    </div>

                    <!-- Zoom Controls -->
                    <div class="zoom-controls">
                        <button id="zoom-out" class="icon-btn" title="Zoom Out" aria-label="Zoom Out">
                            <i class="fas fa-minus"></i>
                        </button>
                        <span id="zoom-level">100%</span>
                        <button id="zoom-in" class="icon-btn" title="Zoom In" aria-label="Zoom In">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button id="fit-width" class="icon-btn" title="Fit to Width" aria-label="Fit to Width">
                            <i class="fas fa-arrows-alt-h"></i>
                        </button>
                        <button id="fit-page" class="icon-btn" title="Fit to Page" aria-label="Fit to Page">
                            <i class="fas fa-arrows-alt-v"></i>
                        </button>
                    </div>
                    
                    <!-- Theme Toggle -->
                    <div class="theme-controls">
                        <button id="toggle-theme" class="icon-btn" title="Toggle Dark/Light Mode" aria-label="Toggle Dark/Light Mode">
                            <i class="fas fa-moon"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Viewer Area -->
            <div class="viewer-container" id="viewer-container">
                <div id="page-wrapper" class="page-wrapper">
                    <!-- Dynamic rendering under correct dimensions -->
                    <iframe id="page-frame" src="" frameborder="0" title="Book Page Content"></iframe>
                </div>
            </div>

            <!-- Footer Pagination -->
            <footer class="pagination-bar" aria-label="Pagination Navigation">
                <button id="prev-page" class="btn" title="Previous Page" aria-label="Previous Page">
                    <i class="fas fa-chevron-left"></i> Prev
                </button>
                <div class="page-input-container">
                    Page <input type="number" id="page-input" value="1" min="1" aria-label="Current Page Input"> of <span id="total-pages">482</span>
                </div>
                <button id="next-page" class="btn" title="Next Page" aria-label="Next Page">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </footer>
        </main>
    </div>

    <!-- Main Logic -->
    <script src="js/app.js"></script>
</body>
</html>
