services:

  postgres:
    ports:
      - "5433:5432"   # 5433 tránh conflict với Homebrew Postgres

  redis:
    ports:
      - "6380:6379"   # 6380 tránh conflict với Homebrew Redis

  app:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend           # hot reload
      - app_data:/app/backend/data       # persist uploaded files
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./reader.html:/usr/share/nginx/html/reader.html:ro
      - ./reader_app.js:/usr/share/nginx/html/reader_app.js:ro
      - ./reader_style.css:/usr/share/nginx/html/reader_style.css:ro
      - ./preview.html:/usr/share/nginx/html/preview.html:ro
      - ./preview_app.js:/usr/share/nginx/html/preview_app.js:ro
      - ./preview_style.css:/usr/share/nginx/html/preview_style.css:ro
    depends_on:
      - app

volumes:
  app_data:
