services:

  app:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    restart: unless-stopped
    profiles: []    # override: enable worker in prod (no --profile needed)
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./reader.html:/usr/share/nginx/html/reader.html:ro
      - ./reader_app.js:/usr/share/nginx/html/reader_app.js:ro
      - ./reader_style.css:/usr/share/nginx/html/reader_style.css:ro
      - ./preview.html:/usr/share/nginx/html/preview.html:ro
      - ./preview_app.js:/usr/share/nginx/html/preview_app.js:ro
      - ./preview_style.css:/usr/share/nginx/html/preview_style.css:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro       # certbot mounts SSL certs here
    depends_on:
      - app
